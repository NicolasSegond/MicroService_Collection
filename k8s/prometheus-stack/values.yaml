fullnameOverride: "prometheus"
namespaceOverride: "monitoring"

alertmanager:
  enabled: true
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'default'
      routes:
        - receiver: 'null'
          matchers:
            - alertname = Watchdog
        - receiver: 'null'
          matchers:
            - alertname = InfoInhibitor
        - receiver: 'default'
          matchers:
            - severity = critical
          group_interval: 1m
    receivers:
      - name: 'null'
      - name: 'default'
        webhook_configs:
          - url: 'http://alertmanager-discord.monitoring:9094'
            send_resolved: true
    inhibit_rules:
      - source_matchers:
          - severity = critical
        target_matchers:
          - severity = warning
        equal: ['alertname', 'namespace']

  alertmanagerSpec:
    resources:
      requests:
        memory: "64Mi"
        cpu: "10m"
      limits:
        memory: "128Mi"
        cpu: "100m"
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi

prometheus:
  enabled: true
  prometheusSpec:
    retention: 15d

    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"

    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

    # Pick up all ServiceMonitors/PodMonitors regardless of labels
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false

    # Annotation-based discovery for marketplace pods
    additionalScrapeConfigs:
      - job_name: 'kubernetes-pods-annotations'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [marketplace]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod

grafana:
  enabled: true
  adminPassword: "admin"  # Override via --set or secret

  # Fix permission denied on PVC (minikube/WSL2)
  initChownData:
    enabled: false
  podSecurityContext:
    runAsUser: 472
    runAsGroup: 472
    fsGroup: 472

  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"

  persistence:
    enabled: true
    size: 1Gi

  sidecar:
    datasources:
      uid: prometheus

  defaultDashboardsTimezone: browser

  grafana.ini:
    server:
      root_url: "http://localhost:3001"

additionalPrometheusRulesMap:
  marketplace-rules:
    groups:
      - name: marketplace.availability
        rules:
          - alert: HighErrorRate
            expr: |
              (sum(rate(traefik_router_requests_total{code=~"5.."}[5m]))
              / sum(rate(traefik_router_requests_total[5m]))) * 100 > 1
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "High error rate detected"
              description: "Error rate is {{ $value | printf \"%.2f\" }}% (threshold: 1%)"

          - alert: HighLatency
            expr: |
              histogram_quantile(0.99, sum(rate(traefik_service_request_duration_seconds_bucket[5m])) by (le)) > 1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High P99 latency detected"
              description: "P99 latency is {{ $value | printf \"%.2f\" }}s (threshold: 1s)"

          - alert: ServiceDown
            expr: kube_deployment_status_replicas_available{namespace="marketplace"} == 0
            for: 30s
            labels:
              severity: critical
            annotations:
              summary: "Service {{ $labels.deployment }} is down"
              description: "{{ $labels.deployment }} has 0 available replicas for more than 30 seconds"

          - alert: NoTraffic
            expr: sum(rate(traefik_router_requests_total[5m])) == 0
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "No traffic detected"
              description: "No requests received in the last 10 minutes"

      - name: marketplace.resources
        rules:
          - alert: PodFrequentRestart
            expr: increase(kube_pod_container_status_restarts_total{namespace="marketplace"}[1h]) > 3
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} is restarting frequently"
              description: "{{ $labels.pod }} has restarted {{ $value }} times in the last hour"

additionalServiceMonitors:
  - name: traefik
    selector:
      matchLabels:
        app: traefik
    namespaceSelector:
      matchNames:
        - marketplace
    endpoints:
      - port: dashboard
        interval: 15s
        path: /metrics

kubeApiServer:
  enabled: false

kubeControllerManager:
  enabled: false

coreDns:
  enabled: false

kubeEtcd:
  enabled: false

kubeScheduler:
  enabled: false

kubeProxy:
  enabled: false

nodeExporter:
  resources:
    requests:
      memory: "32Mi"
      cpu: "10m"
    limits:
      memory: "64Mi"
      cpu: "100m"

kube-state-metrics:
  resources:
    requests:
      memory: "32Mi"
      cpu: "10m"
    limits:
      memory: "64Mi"
      cpu: "100m"

prometheusOperator:
  resources:
    requests:
      memory: "64Mi"
      cpu: "10m"
    limits:
      memory: "128Mi"
      cpu: "100m"
